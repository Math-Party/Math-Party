<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Party - Jogo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style/escolhapersonagens.css">
</head>
<body>
    <div class="container">
        <a href="../index.html"><img src="../images/voltar.png" alt="" class="btn-voltar"></a>
        <h1>Escolham seus personagens</h1>
        <div class="cards">
            <div class="card">
                <input type="text" placeholder="Jogador 1">
                <img src="../images/adicaoEscolha.png" alt="adição">
                <button>Habilitar</button>
            </div>
            <div class="card">
                <input type="text" placeholder="Jogador 2">
                <img src="../images/divisaoEscolha.png" alt="divisão">
                <button>Habilitar</button>
            </div>
            <div class="card">
                <input type="text" placeholder="Jogador 3">
                <img src="../images/subtracaoEscolha.png" alt="subtração">
                <button>Habilitar</button>
            </div>
            <div class="card">
                <input type="text" placeholder="Jogador 4">
                <img src="../images/multiplicacaoEscolha.png" alt="multiplicação">
                <button>Habilitar</button>
            </div>
        </div>
        <a href="tabuleiro.html"><button class="jogar">Jogar</button></a>
    </div>
    <script type="module" src="../script/escolhapersonagens.js"></script>
</body>
</html>
